name: identity-required-gates

on:
  workflow_call:

jobs:
  validate-identity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint workflows (actionlint)
        uses: rhysd/actionlint@v1

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Path governance rules (ast-grep)
        run: sg scan -r .github/ast-grep/no-default-repo-runtime-fallback.yml .

      - name: Validate protocol base
        run: python3 scripts/validate_identity_protocol.py

      - name: Validate governance snapshot index
        run: python3 scripts/validate_audit_snapshot_index.py

      - name: Validate protocol SSOT source boundary
        run: python3 scripts/validate_protocol_ssot_source.py

      - name: Validate changelog update for significant changes
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            BASE_SHA="${PR_BASE_SHA}"
            HEAD_SHA="${PR_HEAD_SHA}"
          elif [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${PUSH_BEFORE_SHA}"
            HEAD_SHA="${CURRENT_SHA}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi
          python3 scripts/validate_changelog_updated.py --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Validate release metadata synchronization
        run: python3 scripts/validate_release_metadata_sync.py

      - name: Resolve identity targets for required-gates
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            BASE_SHA="${PR_BASE_SHA}"
            HEAD_SHA="${PR_HEAD_SHA}"
          elif [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${PUSH_BEFORE_SHA}"
            HEAD_SHA="${CURRENT_SHA}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi
          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${HEAD_SHA}" >> "$GITHUB_ENV"

          IDS=$(BASE_SHA="${BASE_SHA}" HEAD_SHA="${HEAD_SHA}" python3 - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path
          import yaml

          catalog = yaml.safe_load(Path("identity/catalog/identities.yaml").read_text()) or {}
          rows = [x for x in catalog.get("identities", []) if isinstance(x, dict)]
          all_ids = [str(x.get("id", "")).strip() for x in rows if str(x.get("id", "")).strip()]
          active_ids = [str(x.get("id", "")).strip() for x in rows if str(x.get("status", "")).strip().lower() == "active" and str(x.get("id", "")).strip()]
          default_id = str(catalog.get("default_identity") or "").strip()

          base = os.environ.get("BASE_SHA", "").strip()
          head = os.environ.get("HEAD_SHA", "").strip()
          p = subprocess.run(["git", "diff", "--name-only", f"{base}..{head}"], capture_output=True, text=True)
          changed = [ln.strip() for ln in p.stdout.splitlines() if ln.strip()]

          changed_ids = []
          for f in changed:
              m = re.match(r"^identity/packs/([^/]+)/", f)
              if m:
                  changed_ids.append(m.group(1))
                  continue
              m = re.match(r"^identity/([^/]+)/", f)
              if m and m.group(1) not in {"runtime", "catalog", "protocol", "packs"}:
                  changed_ids.append(m.group(1))
                  continue
              if f == "identity/catalog/identities.yaml":
                  changed_ids.extend(all_ids)

          ordered = []
          for x in active_ids + ([default_id] if default_id else []) + changed_ids + all_ids:
              if x and x in all_ids and x not in ordered:
                  ordered.append(x)

          print(" ".join(ordered))
          PY
          )
          if [ -z "${IDS}" ]; then
            echo "[FAIL] no identities resolved for required-gates"
            exit 1
          fi
          PRIMARY_ID="$(printf '%s\n' "${IDS}" | awk '{print $1}')"
          echo "IDS=${IDS}" >> "$GITHUB_ENV"
          echo "PRIMARY_ID=${PRIMARY_ID}" >> "$GITHUB_ENV"
          echo "resolved identities: ${IDS}"

      - name: Validate protocol handoff coupling
        run: python3 scripts/validate_protocol_handoff_coupling.py --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Compile runtime
        run: python3 scripts/compile_identity_runtime.py --identity-id "${PRIMARY_ID}"

      - name: Validate identity manifest + discovery
        run: |
          python3 scripts/validate_identity_manifest.py
          python3 scripts/test_identity_discovery_contract.py >/tmp/identity_discovery_contract.protocol_repo.json

      - name: Validate required runtime gates across resolved identities
        run: |
          BASE_SHA="${BASE_SHA:-$(git rev-parse HEAD~1)}"
          HEAD_SHA="${HEAD_SHA:-$(git rev-parse HEAD)}"
          IDS="${IDS:-}"
          echo "target identities: $IDS"
          if [ -z "$IDS" ]; then
            echo "[FAIL] IDS is empty"
            exit 1
          fi
          CATALOG_PARENT="$(dirname "$(realpath identity/catalog/identities.yaml)")"
          for ID in $IDS; do
            python3 scripts/validate_identity_runtime_contract.py --identity-id "$ID"
            python3 scripts/validate_identity_prompt_quality.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --scope USER
            python3 scripts/validate_identity_role_binding.py --identity-id "$ID"
            python3 scripts/validate_identity_home_catalog_alignment.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --identity-home "$CATALOG_PARENT"
            python3 scripts/validate_fixture_runtime_boundary.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_actor_session_binding.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_actor_session_multibinding_concurrency.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/validate_no_implicit_switch.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_cross_actor_isolation.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_identity_session_refresh_status.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --baseline-policy warn
            python3 scripts/validate_e2e_hermetic_runtime_import.py --operation ci --pythonpath-bootstrap-mode internal_bootstrap --json-only
            python3 scripts/render_identity_response_stamp.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --view external --disclosure-level standard --out "/tmp/identity-response-stamp-${ID}.json" --json-only
            python3 scripts/validate_identity_response_stamp.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --stamp-json "/tmp/identity-response-stamp-${ID}.json" --force-check --enforce-user-visible-gate --operation ci --blocker-receipt-out "/tmp/identity-stamp-blocker-receipt-${ID}.json"
            python3 scripts/validate_identity_response_stamp_blocker_receipt.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --force-check --receipt "/tmp/identity-stamp-blocker-receipt-${ID}.json"
            python3 scripts/validate_reply_identity_context_first_line.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --stamp-json "/tmp/identity-response-stamp-${ID}.json" --force-check --enforce-first-line-gate --operation ci --blocker-receipt-out "/tmp/identity-reply-first-line-blocker-receipt-${ID}.json"
            python3 scripts/validate_identity_response_stamp_blocker_receipt.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --force-check --receipt "/tmp/identity-reply-first-line-blocker-receipt-${ID}.json"
            python3 scripts/validate_layer_intent_resolution.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --stamp-json "/tmp/identity-response-stamp-${ID}.json" --force-check --enforce-layer-intent-gate --operation ci --json-only
            python3 scripts/validate_send_time_reply_gate.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --stamp-json "/tmp/identity-response-stamp-${ID}.json" --force-check --enforce-send-time-gate --operation ci --blocker-receipt-out "/tmp/identity-send-time-reply-gate-blocker-receipt-${ID}.json"
            python3 scripts/validate_identity_response_stamp_blocker_receipt.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --force-check --receipt "/tmp/identity-send-time-reply-gate-blocker-receipt-${ID}.json"
            python3 scripts/validate_execution_reply_identity_coherence.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --stamp-json "/tmp/identity-response-stamp-${ID}.json" --force-check --enforce-coherence-gate --operation ci --blocker-receipt-out "/tmp/identity-execution-reply-coherence-blocker-receipt-${ID}.json"
            python3 scripts/validate_identity_response_stamp_blocker_receipt.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --force-check --receipt "/tmp/identity-execution-reply-coherence-blocker-receipt-${ID}.json"
            python3 scripts/validate_identity_upgrade_prereq.py --identity-id "$ID"
            python3 scripts/validate_identity_update_lifecycle.py --identity-id "$ID"
            python3 scripts/validate_identity_trigger_regression.py --identity-id "$ID"
            python3 scripts/validate_identity_learning_loop.py --identity-id "$ID"
            python3 scripts/validate_identity_collab_trigger.py --identity-id "$ID" --self-test
            python3 scripts/validate_agent_handoff_contract.py --identity-id "$ID" --self-test
            IDENTITY_RUNTIME_OUTPUT_ROOT=/tmp/identity-runtime python3 scripts/export_route_quality_metrics.py --catalog identity/catalog/identities.yaml --identity-id "$ID"
            python3 scripts/validate_identity_orchestration_contract.py --identity-id "$ID"
            python3 scripts/validate_identity_dialogue_content.py --identity-id "$ID"
            python3 scripts/validate_identity_dialogue_cross_validation.py --identity-id "$ID"
            python3 scripts/validate_identity_dialogue_result_support.py --identity-id "$ID"
            python3 scripts/validate_identity_knowledge_contract.py --identity-id "$ID" --self-test
            python3 scripts/validate_identity_experience_feedback.py --identity-id "$ID" --self-test
            python3 scripts/validate_identity_install_safety.py --identity-id "$ID"
            python3 scripts/validate_identity_install_provenance.py --identity-id "$ID"
            python3 scripts/validate_identity_tool_installation.py --identity-id "$ID"
            python3 scripts/validate_identity_vendor_api_discovery.py --identity-id "$ID"
            python3 scripts/validate_identity_vendor_api_solution.py --identity-id "$ID"
            python3 scripts/validate_semantic_routing_guard.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_instance_protocol_split_receipt.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/validate_work_layer_gate_set_routing.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --base "${BASE_SHA}" --head "${HEAD_SHA}" --applied-gate-set instance_required_checks --force-check --json-only
            python3 scripts/validate_protocol_feedback_reply_channel.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --force-check --json-only
            python3 scripts/validate_protocol_feedback_bootstrap_ready.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --force-check --json-only
            python3 scripts/validate_protocol_entry_candidate_bridge.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --force-check --json-only
            python3 scripts/validate_protocol_inquiry_followup_chain.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --force-check --json-only
            python3 scripts/validate_protocol_vendor_semantic_isolation.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_external_source_trust_chain.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_protocol_data_sanitization_boundary.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/trigger_platform_optimization_discovery.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_discovery_requiredization.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/build_vibe_coding_feeding_pack.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --out-root /tmp/vibe-coding-feeding-packs
            python3 scripts/validate_identity_capability_fit_optimization.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/validate_capability_composition_before_discovery.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/validate_capability_fit_review_freshness.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/validate_capability_fit_roundtable_evidence.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/trigger_capability_fit_review.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --json-only
            python3 scripts/build_capability_fit_matrix.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci --out-root /tmp/capability-fit-matrices --json-only
            python3 scripts/validate_vendor_namespace_separation.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_required_contract_coverage.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_identity_experience_feedback_governance.py --identity-id "$ID"
            python3 scripts/validate_identity_self_upgrade_enforcement.py --identity-id "$ID" --base "${BASE_SHA}" --head "${HEAD_SHA}"
            PR_BASE_SHA="${BASE_SHA}" PR_HEAD_SHA="${HEAD_SHA}" CI=true python3 scripts/identity_creator.py update --identity-id "$ID" --mode review-required --out-dir /tmp/identity-upgrade-reports --expected-work-layer instance
            UPGRADE_REPORT=$(ls -1t /tmp/identity-upgrade-reports/identity-upgrade-exec-"$ID"-*.json | head -n 1)
            python3 scripts/validate_writeback_continuity.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --report "$UPGRADE_REPORT" --operation ci
            python3 scripts/validate_post_execution_mandatory.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --report "$UPGRADE_REPORT" --operation ci
            python3 scripts/validate_protocol_feedback_sidecar_contract.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --report "$UPGRADE_REPORT" --operation ci --enforce-blocking
            python3 scripts/validate_instance_base_repo_write_boundary.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --report "$UPGRADE_REPORT" --operation ci
            python3 scripts/validate_protocol_feedback_ssot_archival.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --operation ci
            python3 scripts/validate_identity_protocol_baseline_freshness.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --execution-report "$UPGRADE_REPORT" --baseline-policy strict
            python3 scripts/validate_identity_protocol_version_alignment.py --identity-id "$ID" --catalog identity/catalog/identities.yaml --repo-catalog identity/catalog/identities.yaml --execution-report "$UPGRADE_REPORT" --operation ci --alignment-policy strict --json-only
            python3 scripts/validate_identity_self_upgrade_enforcement.py --identity-id "$ID" --execution-report "$UPGRADE_REPORT" --require-ci-binding --expect-github-run-id "${{ github.run_id }}" --expect-github-sha "${{ github.sha }}"
            python3 scripts/validate_identity_protocol_root_evidence.py --identity-id "$ID" --report "$UPGRADE_REPORT"
            python3 scripts/validate_identity_mode_promotion_arbitration.py --identity-id "$ID" --base "${BASE_SHA}" --head "${HEAD_SHA}" --report "$UPGRADE_REPORT"
            python3 scripts/validate_identity_prompt_activation.py --identity-id "$ID" --report "$UPGRADE_REPORT"
            python3 scripts/validate_identity_capability_arbitration.py --identity-id "$ID" --self-test --upgrade-report "$UPGRADE_REPORT"
            python3 scripts/validate_identity_ci_enforcement.py --identity-id "$ID"
          done

      - name: Identity creator protocol checks
        run: bash skills/identity-creator/scripts/validate_identity_protocol.sh .

      - name: Check generated runtime brief is up to date
        run: git diff --exit-code -- identity/runtime/IDENTITY_COMPILED.md
