name: identity-required-gates

on:
  workflow_call:

jobs:
  validate-identity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint workflows (actionlint)
        uses: rhysd/actionlint@v1

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Path governance rules (ast-grep)
        run: sg scan -r .github/ast-grep/no-default-repo-runtime-fallback.yml .

      - name: Validate protocol base
        run: python3 scripts/validate_identity_protocol.py

      - name: Validate governance snapshot index
        run: python3 scripts/validate_audit_snapshot_index.py

      - name: Validate protocol SSOT source boundary
        run: python3 scripts/validate_protocol_ssot_source.py

      - name: Validate changelog update for significant changes
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            BASE_SHA="${PR_BASE_SHA}"
            HEAD_SHA="${PR_HEAD_SHA}"
          elif [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${PUSH_BEFORE_SHA}"
            HEAD_SHA="${CURRENT_SHA}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi
          python3 scripts/validate_changelog_updated.py --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Validate release metadata synchronization
        run: python3 scripts/validate_release_metadata_sync.py

      - name: Resolve identity targets for required-gates
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
            BASE_SHA="${PR_BASE_SHA}"
            HEAD_SHA="${PR_HEAD_SHA}"
          elif [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${PUSH_BEFORE_SHA}"
            HEAD_SHA="${CURRENT_SHA}"
          else
            BASE_SHA="$(git rev-parse HEAD~1)"
            HEAD_SHA="$(git rev-parse HEAD)"
          fi
          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${HEAD_SHA}" >> "$GITHUB_ENV"

          IDS=$(BASE_SHA="${BASE_SHA}" HEAD_SHA="${HEAD_SHA}" python3 - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path
          import yaml

          catalog = yaml.safe_load(Path("identity/catalog/identities.yaml").read_text()) or {}
          rows = [x for x in catalog.get("identities", []) if isinstance(x, dict)]
          all_ids = [str(x.get("id", "")).strip() for x in rows if str(x.get("id", "")).strip()]
          active_ids = [str(x.get("id", "")).strip() for x in rows if str(x.get("status", "")).strip().lower() == "active" and str(x.get("id", "")).strip()]
          default_id = str(catalog.get("default_identity") or "").strip()

          base = os.environ.get("BASE_SHA", "").strip()
          head = os.environ.get("HEAD_SHA", "").strip()
          p = subprocess.run(["git", "diff", "--name-only", f"{base}..{head}"], capture_output=True, text=True)
          changed = [ln.strip() for ln in p.stdout.splitlines() if ln.strip()]

          changed_ids = []
          for f in changed:
              m = re.match(r"^identity/packs/([^/]+)/", f)
              if m:
                  changed_ids.append(m.group(1))
                  continue
              m = re.match(r"^identity/([^/]+)/", f)
              if m and m.group(1) not in {"runtime", "catalog", "protocol", "packs"}:
                  changed_ids.append(m.group(1))
                  continue
              if f == "identity/catalog/identities.yaml":
                  changed_ids.extend(all_ids)

          ordered = []
          for x in active_ids + ([default_id] if default_id else []) + changed_ids + all_ids:
              if x and x in all_ids and x not in ordered:
                  ordered.append(x)

          print(" ".join(ordered))
          PY
          )
          if [ -z "${IDS}" ]; then
            echo "[FAIL] no identities resolved for required-gates"
            exit 1
          fi
          PRIMARY_ID="$(printf '%s\n' "${IDS}" | awk '{print $1}')"
          echo "IDS=${IDS}" >> "$GITHUB_ENV"
          echo "PRIMARY_ID=${PRIMARY_ID}" >> "$GITHUB_ENV"
          echo "resolved identities: ${IDS}"

      - name: Validate protocol handoff coupling
        run: python3 scripts/validate_protocol_handoff_coupling.py --base "${BASE_SHA}" --head "${HEAD_SHA}"

      - name: Compile runtime
        run: python3 scripts/compile_identity_runtime.py --identity-id "${PRIMARY_ID}"

      - name: Validate identity manifest + discovery
        run: |
          python3 scripts/validate_identity_manifest.py
          python3 scripts/test_identity_discovery_contract.py >/tmp/identity_discovery_contract.protocol_repo.json

      - name: Validate required runtime gates across resolved identities
        run: |
          BASE_SHA="${BASE_SHA:-$(git rev-parse HEAD~1)}"
          HEAD_SHA="${HEAD_SHA:-$(git rev-parse HEAD)}"
          IDS="${IDS:-}"
          echo "target identities: $IDS"
          if [ -z "$IDS" ]; then
            echo "[FAIL] IDS is empty"
            exit 1
          fi
          for ID in $IDS; do
            python3 scripts/validate_identity_runtime_contract.py --identity-id "$ID"
            python3 scripts/validate_identity_role_binding.py --identity-id "$ID"
            python3 scripts/validate_identity_upgrade_prereq.py --identity-id "$ID"
            python3 scripts/validate_identity_update_lifecycle.py --identity-id "$ID"
            python3 scripts/validate_identity_trigger_regression.py --identity-id "$ID"
            python3 scripts/validate_identity_learning_loop.py --identity-id "$ID"
            python3 scripts/validate_identity_collab_trigger.py --identity-id "$ID" --self-test
            python3 scripts/validate_agent_handoff_contract.py --identity-id "$ID" --self-test
            IDENTITY_RUNTIME_OUTPUT_ROOT=/tmp/identity-runtime python3 scripts/export_route_quality_metrics.py --catalog identity/catalog/identities.yaml --identity-id "$ID"
            python3 scripts/validate_identity_orchestration_contract.py --identity-id "$ID"
            python3 scripts/validate_identity_dialogue_content.py --identity-id "$ID"
            python3 scripts/validate_identity_dialogue_cross_validation.py --identity-id "$ID"
            python3 scripts/validate_identity_dialogue_result_support.py --identity-id "$ID"
            python3 scripts/validate_identity_knowledge_contract.py --identity-id "$ID" --self-test
            python3 scripts/validate_identity_experience_feedback.py --identity-id "$ID" --self-test
            python3 scripts/validate_identity_install_safety.py --identity-id "$ID"
            python3 scripts/validate_identity_install_provenance.py --identity-id "$ID"
            python3 scripts/validate_identity_experience_feedback_governance.py --identity-id "$ID"
            python3 scripts/validate_identity_self_upgrade_enforcement.py --identity-id "$ID" --base "${BASE_SHA}" --head "${HEAD_SHA}"
            PR_BASE_SHA="${BASE_SHA}" PR_HEAD_SHA="${HEAD_SHA}" CI=true python3 scripts/identity_creator.py update --identity-id "$ID" --mode review-required --out-dir /tmp/identity-upgrade-reports
            UPGRADE_REPORT=$(ls -1t /tmp/identity-upgrade-reports/identity-upgrade-exec-"$ID"-*.json | head -n 1)
            python3 scripts/validate_identity_self_upgrade_enforcement.py --identity-id "$ID" --execution-report "$UPGRADE_REPORT" --require-ci-binding --expect-github-run-id "${{ github.run_id }}" --expect-github-sha "${{ github.sha }}"
            python3 scripts/validate_identity_protocol_root_evidence.py --identity-id "$ID" --report "$UPGRADE_REPORT"
            python3 scripts/validate_identity_mode_promotion_arbitration.py --identity-id "$ID" --base "${BASE_SHA}" --head "${HEAD_SHA}" --report "$UPGRADE_REPORT"
            python3 scripts/validate_identity_capability_arbitration.py --identity-id "$ID" --self-test --upgrade-report "$UPGRADE_REPORT"
            python3 scripts/validate_identity_ci_enforcement.py --identity-id "$ID"
          done

      - name: Identity creator protocol checks
        run: bash skills/identity-creator/scripts/validate_identity_protocol.sh .

      - name: Check generated runtime brief is up to date
        run: git diff --exit-code -- identity/runtime/IDENTITY_COMPILED.md
